
services:
  backend:
    build: ./backend
    container_name: career-compass-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Override .env for the docker network: backend talks to searxng on
      # the in-network service name + internal port (8080), not the host
      # publish port (8888). Set here so a host-oriented backend/.env
      # used for local dev still works.
      SEARXNG_URL: http://searxng:8080
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    container_name: career-compass-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
